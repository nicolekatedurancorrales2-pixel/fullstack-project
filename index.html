<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager</title>

    <style>
      /* ===== ESTILO GENERAL ===== */
      body {
        font-family: Arial, sans-serif;
        background: #b08968;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }

      .container {
        background: white;
        padding: 20px;
        border-radius: 12px;
        width: 700px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        text-align: center;
      }

      h1 {
        margin-bottom: 15px;
      }

      /* ===== INPUT ===== */
      input {
        width: 60%;
        padding: 8px;
        border: 2px solid #ccc;
        border-radius: 8px;
        outline: none;
        margin-right: 15px;
      }

      /* ===== BOTÓN ===== */
      button {
        padding: 8px 12px;
        border: none;
        background: #6f4518;
        color: white;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        background: #fffdde;
        color: black;
        border: 1px solid black;
      }

      /* ===== LISTA ===== */
      ul {
        list-style: none;
        padding: 0;
        margin-top: 20px;
      }

      /* ===== TAREAS ===== */
      li {
        background: #fef1e1;
        margin: 8px 0;
        padding: 10px;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.2s;
        /*width: 100%;*/
        text-align: start;
        word-wrap: break-word;
      }

      li:hover {
        background: #ddd;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Task Manager</h1>

      <input
        type="text"
        id="taskInput"
        placeholder="Escribe una tarea"
        maxlength="150"
      />
      <button id="addTaskBtn" onclick="agregarTarea()">Agregar Tarea</button>

      <ul id="taskList"></ul>
    </div>

    <script>
      function agregarTarea() {
        const input = document.getElementById("taskInput");
        const texto = input.value.trim();

        // No permitir tareas vacías
        if (texto === "") {
          alert("Escribe una tarea válida");
          return;
        }

        const lista = document.getElementById("taskList");

        // Crear nueva tarea
        const li = document.createElement("li");
        li.textContent = texto;

        // Eliminar tarea al hacer clic
        li.onclick = function () {
          li.remove();
        };

        // Agregar a la lista
        lista.appendChild(li);

        // Limpiar input
        input.value = "";
      }
    </script>
  </body>
</html>
